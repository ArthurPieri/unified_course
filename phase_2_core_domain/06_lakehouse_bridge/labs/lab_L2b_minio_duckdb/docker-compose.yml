# Adapted from ../dataeng/docker-compose.yml:L26-L43
# Single-service MinIO for Phase 2 lakehouse bridge lab.
services:
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: lab_l2b_minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  minio_data:
