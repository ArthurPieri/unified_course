
# Lab L3c dbt project.
# Pattern lifted from ../dataeng/dbt_project/dbt_project.yml:L1-L27 and trimmed
# for the lab. Keeps the staging → silver, marts → gold convention.

name: lakehouse_l3c
version: "1.0.0"
config-version: 2

profile: lakehouse_l3c

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - target
  - dbt_packages
  - logs

models:
  lakehouse_l3c:
    staging:
      +materialized: view
      +schema: silver
    intermediate:
      +materialized: table
      +schema: silver
    marts:
      +materialized: table
      +schema: gold
